name: Dependabot Continuous Monitoring CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Platform trigger (Continuous Dependency Monitoring)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run trigger

      - name: Upload dependabot.json
        uses: actions/upload-artifact@v4
        with:
          name: dependabot
          path: dependabot.json
